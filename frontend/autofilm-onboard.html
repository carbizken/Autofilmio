<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AutoFilm — Set Up Your Dealership</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap">
<style>
:root{--bg:#0a0a0d;--bg1:#111116;--bg2:#18181e;--bg3:#202028;--b0:rgba(255,255,255,.05);--b1:rgba(255,255,255,.09);--b2:rgba(255,255,255,.16);--t1:rgba(255,255,255,.96);--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.40);--t4:rgba(255,255,255,.20);--fire:#D94F00;--fire2:#E85A0A;--firet:rgba(217,79,0,.10);--fireb:rgba(217,79,0,.22);--green:#22c55e;--amber:#f59e0b;--ff:'Geist',-apple-system,sans-serif;--fm:'Geist Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* Progress */
.progress{display:flex;align-items:center;gap:8px;padding:32px 24px 0;width:100%;max-width:580px}
.prog-step{display:flex;align-items:center;gap:8px;flex:1}
.prog-dot{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:2px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--t4);transition:all .3s;flex-shrink:0}
.prog-dot.on{background:var(--fire);border-color:var(--fire);color:#fff;box-shadow:0 2px 10px rgba(217,79,0,.4)}
.prog-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.prog-line{flex:1;height:2px;background:var(--b1);border-radius:1px}
.prog-line.on{background:var(--fire)}.prog-line.done{background:var(--green)}

/* Card */
.card{max-width:580px;width:100%;margin:24px auto;padding:0 20px}
.card-inner{background:var(--bg1);border:1px solid var(--b1);border-radius:20px;padding:32px 28px;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.step-eyebrow{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--fire2);margin-bottom:8px}
.step-title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.step-sub{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:24px}

/* Fields */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:block}
.field-inp{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--b1);border-radius:10px;color:var(--t1);font-size:14px;font-family:var(--ff);outline:none;transition:border-color .15s}
.field-inp:focus{border-color:var(--fire)}
.field-inp::placeholder{color:var(--t4)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Buttons */
.btn-primary{width:100%;padding:14px;border-radius:12px;background:var(--fire);color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:var(--ff);box-shadow:0 4px 20px rgba(217,79,0,.3);transition:all .14s;margin-top:8px}
.btn-primary:hover{background:var(--fire2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{width:100%;padding:12px;border-radius:10px;background:transparent;border:1px solid var(--b2);color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ff);margin-top:8px}

/* Scanning animation */
.scanning{display:none;text-align:center;padding:32px 0}
.scanning.on{display:block}
.scan-ring{width:60px;height:60px;border:3px solid var(--b1);border-top-color:var(--fire);border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-text{font-size:13px;color:var(--t2)}

/* Scraped preview */
.preview{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;padding:16px;margin:16px 0}
.prev-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--b0);font-size:12px}
.prev-row:last-child{border-bottom:none}
.prev-label{color:var(--t3);min-width:80px;font-weight:600}
.prev-val{color:var(--t1);font-weight:700;flex:1}
.prev-logo{width:40px;height:40px;border-radius:8px;background:var(--bg3);object-fit:contain}
.color-swatch{width:24px;height:24px;border-radius:6px;border:2px solid var(--b2)}

/* Team invite */
.invite-row{display:flex;gap:8px;align-items:end;margin-bottom:10px}
.invite-row .field{flex:1;margin-bottom:0}
.invite-row .field-inp{font-size:12px;padding:10px}
.btn-add{padding:8px 14px;border-radius:8px;background:var(--firet);border:1px solid var(--fireb);color:var(--fire2);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--ff);white-space:nowrap}
.invited-list{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.invited{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:8px;font-size:12px}
.invited-av{width:26px;height:26px;border-radius:50%;background:var(--fire);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.invited-info{flex:1}.invited-name{font-weight:700}.invited-email{color:var(--t3);font-size:10px}
.invited-dept{font-size:9px;font-weight:700;padding:2px 7px;border-radius:12px;background:var(--bg3);color:var(--t3)}

/* Billing plans */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
@media(max-width:520px){.plan-grid{grid-template-columns:1fr}}
.plan-card{position:relative;background:var(--bg2);border:1px solid var(--b1);border-radius:14px;padding:20px 16px;cursor:pointer;transition:border-color .14s,transform .14s;text-align:left}
.plan-card:hover{border-color:var(--fire);transform:translateY(-1px)}
.plan-card.busy{opacity:.55;pointer-events:none}
.plan-card.featured{border-color:var(--fireb);background:linear-gradient(180deg,var(--firet),var(--bg2))}
.plan-badge{position:absolute;top:-9px;right:12px;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:12px;background:var(--fire);color:#fff}
.plan-name{font-size:14px;font-weight:800;margin-bottom:4px}
.plan-price{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:12px}
.plan-price span{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:0}
.plan-feats{list-style:none;margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
.plan-feats li{font-size:11px;color:var(--t2);display:flex;gap:7px;align-items:baseline}
.plan-feats li::before{content:'\2713';color:var(--fire2);font-weight:800}
.plan-trial{font-size:10px;font-weight:700;color:var(--t3);border-top:1px solid var(--b0);padding-top:10px}
.billing-note{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:var(--amber);font-size:12px;line-height:1.5;border-radius:10px;padding:10px 12px;margin-bottom:16px}
.billing-ok{width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.12);border:2px solid var(--green);color:var(--green);font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:8px auto 16px}
.billing-status{font-size:12px;font-weight:700;color:var(--t2);background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:10px 14px;margin-bottom:20px}
.billing-status.on{color:var(--green);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06)}

/* Success confetti */
.success-card{text-align:center}
.succ-ring{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--fire),var(--fire2));display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(217,79,0,.4)}
.succ-title{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px}
.succ-sub{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:28px}
.succ-links{display:flex;flex-direction:column;gap:10px}
.succ-link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:1px solid var(--b1);border-radius:12px;cursor:pointer;transition:border-color .14s;text-align:left;text-decoration:none;color:var(--t1)}
.succ-link:hover{border-color:var(--b2)}
.succ-link-ico{font-size:20px;flex-shrink:0}
.succ-link-txt{font-size:13px;font-weight:700}
.succ-link-sub{font-size:11px;color:var(--t3);margin-top:2px}

footer{padding:24px;font-size:11px;color:var(--t4);text-align:center}
footer span{color:var(--fire2);font-weight:700}
</style>
</head>
<body>

<!-- Progress -->
<div class="progress" id="progress">
  <div class="prog-step"><div class="prog-dot on" id="pd1">1</div><div class="prog-line" id="pl1"></div></div>
  <div class="prog-step"><div class="prog-dot" id="pd2">2</div><div class="prog-line" id="pl2"></div></div>
  <div class="prog-step"><div class="prog-dot" id="pd3">3</div><div class="prog-line" id="pl3"></div></div>
  <div class="prog-step"><div class="prog-dot" id="pd4">4</div><div class="prog-line" id="pl4"></div></div>
  <div class="prog-step"><div class="prog-dot" id="pd5">5</div><div class="prog-line" id="pl5"></div></div>
  <div class="prog-step"><div class="prog-dot" id="pd6">6</div></div>
</div>

<!-- Steps container -->
<div class="card" id="stepCard"></div>

<footer>Powered by <span>AutoFilm</span> &middot; Video selling for automotive</footer>

<script src="assets/session.js"></script>
<script>
const API = AFSession.API;
const STATE_KEY = 'af_onboard_state';

let step = 1;
let rooftopId = null;
let repId = null;
let onboardToken = null;
let scraped = {};
let invitedReps = [];
let billing = { status: 'none', plan: null, trial_ends_at: null };
let billingConfirmed = false;
let billingNotice = null;
let checkoutBusy = false;

// Persist wizard state across the Stripe Checkout redirect.
function saveState() {
  try {
    sessionStorage.setItem(STATE_KEY, JSON.stringify({ step, rooftopId, repId, onboardToken, scraped, invitedReps }));
  } catch { /* private mode — redirect still works, we just re-derive less */ }
}

function restoreState() {
  try {
    const s = JSON.parse(sessionStorage.getItem(STATE_KEY));
    if (!s) return false;
    rooftopId = s.rooftopId || null;
    repId = s.repId || null;
    onboardToken = s.onboardToken || null;
    scraped = s.scraped || {};
    invitedReps = s.invitedReps || [];
    step = s.step || 4;
    return true;
  } catch { return false; }
}

function render() {
  const card = document.getElementById('stepCard');
  // Update progress dots
  for (let i = 1; i <= 6; i++) {
    const dot = document.getElementById('pd' + i);
    const line = document.getElementById('pl' + i);
    dot.className = 'prog-dot' + (i < step ? ' done' : i === step ? ' on' : '');
    dot.innerHTML = i < step ? '&#10003;' : i;
    if (line) line.className = 'prog-line' + (i < step ? ' done' : i === step ? ' on' : '');
  }

  if (step === 1) renderStep1(card);
  else if (step === 2) renderStep2(card);
  else if (step === 3) renderStep3(card);
  else if (step === 4) renderStep4(card);
  else if (step === 5) renderStep5(card);
  else renderStep6(card);
}

function renderStep1(card) {
  card.innerHTML = `<div class="card-inner">
    <div class="step-eyebrow">Step 1 of 6</div>
    <div class="step-title">Enter Your Dealership Website</div>
    <div class="step-sub">We'll automatically detect your dealership name, logo, brand colors, and contact info.</div>
    <div class="field"><label class="field-label">Dealership Website URL</label><input class="field-inp" id="fUrl" placeholder="www.yourdealership.com" autofocus></div>
    <button class="btn-primary" id="btnScan" onclick="scanWebsite()">Scan My Dealership</button>
    <div class="scanning" id="scanning"><div class="scan-ring"></div><div class="scan-text">Scanning your website...</div></div>
  </div>`;
}

function renderStep2(card) {
  card.innerHTML = `<div class="card-inner">
    <div class="step-eyebrow">Step 2 of 6</div>
    <div class="step-title">Confirm Your Details</div>
    <div class="step-sub">We scraped these from your website. Fix anything that's off.</div>
    <div class="preview">
      ${scraped.logo ? `<div class="prev-row"><span class="prev-label">Logo</span><img class="prev-logo" src="${esc(scraped.logo)}" alt="Logo"></div>` : ''}
      <div class="prev-row"><span class="prev-label">Color</span><div class="color-swatch" style="background:${esc(scraped.brand_color || '#D94F00')}"></div></div>
    </div>
    <div class="field"><label class="field-label">Dealership Name</label><input class="field-inp" id="fName" value="${esc(scraped.name || '')}"></div>
    <div class="row2">
      <div class="field"><label class="field-label">Phone</label><input class="field-inp" id="fPhone" value="${esc(scraped.phone || '')}"></div>
      <div class="field"><label class="field-label">Brand Color</label><input class="field-inp" id="fColor" type="color" value="${scraped.brand_color || '#D94F00'}" style="height:42px;padding:4px"></div>
    </div>
    <div class="field"><label class="field-label">Address</label><input class="field-inp" id="fAddr" value="${esc(scraped.address || '')}"></div>
    <div class="row2">
      <div class="field"><label class="field-label">City</label><input class="field-inp" id="fCity" value="${esc(scraped.city || '')}"></div>
      <div class="field"><label class="field-label">State</label><input class="field-inp" id="fState" value="${esc(scraped.state || '')}"></div>
    </div>
    <button class="btn-primary" onclick="confirmDetails()">Confirm &amp; Continue</button>
  </div>`;
}

function renderStep3(card) {
  card.innerHTML = `<div class="card-inner">
    <div class="step-eyebrow">Step 3 of 6</div>
    <div class="step-title">Create Your Account</div>
    <div class="step-sub">You'll be the admin for ${esc(scraped.name || 'your dealership')}. Next you'll pick a plan and add your team.</div>
    <div class="field"><label class="field-label">Your Full Name</label><input class="field-inp" id="fAdminName" placeholder="Ken Criscione" autofocus></div>
    <div class="field"><label class="field-label">Email</label><input class="field-inp" id="fAdminEmail" type="email" placeholder="ken@dealership.com"></div>
    <div class="field"><label class="field-label">Password</label><input class="field-inp" id="fAdminPass" type="password" placeholder="At least 8 characters"></div>
    <button class="btn-primary" onclick="createAccount()">Create Account</button>
  </div>`;
}

function renderStep4(card) {
  if (billingConfirmed) {
    card.innerHTML = `<div class="card-inner" style="text-align:center">
      <div class="step-eyebrow">Step 4 of 6</div>
      <div class="billing-ok">&#10003;</div>
      <div class="step-title">Your Free Trial Has Started</div>
      <div class="step-sub">${esc(trialCopy())}</div>
      <button class="btn-primary" onclick="step=5;render()">Continue &mdash; Invite Your Team</button>
    </div>`;
    return;
  }

  card.innerHTML = `<div class="card-inner">
    <div class="step-eyebrow">Step 4 of 6</div>
    <div class="step-title">Pick Your Plan</div>
    <div class="step-sub">Both plans start with a 14-day free trial. You won't be charged until the trial ends &mdash; cancel anytime.</div>
    ${billingNotice ? `<div class="billing-note">${esc(billingNotice)}</div>` : ''}
    <div class="plan-grid">
      <div class="plan-card" onclick="startCheckout('standard', this)">
        <div class="plan-name">AutoFilm</div>
        <div class="plan-price">$299<span> /rooftop/mo</span></div>
        <ul class="plan-feats">
          <li>Unlimited users &amp; videos</li>
          <li>SMS delivery + branded player</li>
          <li>Real-time watch notifications</li>
        </ul>
        <div class="plan-trial">14-day free trial &middot; cancel anytime</div>
      </div>
      <div class="plan-card featured" onclick="startCheckout('bundle', this)">
        <div class="plan-badge">Best Value</div>
        <div class="plan-name">Suite Bundle</div>
        <div class="plan-price">$599<span> /mo</span></div>
        <ul class="plan-feats">
          <li>Everything in AutoFilm</li>
          <li>+ AutoCurb, AutoLabels &amp; AutoFrame</li>
          <li>One bill for the whole suite</li>
        </ul>
        <div class="plan-trial">14-day free trial &middot; cancel anytime</div>
      </div>
    </div>
  </div>`;
}

function renderStep5(card) {
  const repHtml = invitedReps.map(r => {
    const init = r.name.split(' ').map(w => w[0]).join('').slice(0, 2);
    return `<div class="invited"><div class="invited-av">${esc(init)}</div><div class="invited-info"><div class="invited-name">${esc(r.name)}</div><div class="invited-email">${esc(r.email)}</div></div><div class="invited-dept">${esc(r.department)}</div></div>`;
  }).join('');

  card.innerHTML = `<div class="card-inner">
    <div class="step-eyebrow">Step 5 of 6</div>
    <div class="step-title">Invite Your Team</div>
    <div class="step-sub">Add sales reps, service advisors, and BDC staff. They'll get an email invite.</div>
    <div class="invite-row">
      <div class="field"><label class="field-label">Name</label><input class="field-inp" id="fRepName" placeholder="Jane Doe"></div>
      <div class="field"><label class="field-label">Email</label><input class="field-inp" id="fRepEmail" placeholder="jane@dealer.com"></div>
      <div class="field"><label class="field-label">Dept</label><select class="field-inp" id="fRepDept" style="font-size:12px"><option>sales</option><option>service</option><option>bdc</option></select></div>
      <button class="btn-add" onclick="addRep()">+ Add</button>
    </div>
    <div class="invited-list" id="invitedList">${repHtml}</div>
    <button class="btn-primary" onclick="finishInvites()">Continue</button>
    <button class="btn-secondary" onclick="finishInvites()">Skip for Now</button>
  </div>`;
}

function renderStep6(card) {
  card.innerHTML = `<div class="card-inner success-card">
    <div class="succ-ring">🎬</div>
    <div class="succ-title">You're Live!</div>
    <div class="succ-sub">AutoFilm is set up for ${esc(scraped.name || 'your dealership')}. Start sending personal videos to your customers today.</div>
    <div class="billing-status${['trialing', 'active'].includes(billing.status) ? ' on' : ''}">${esc(billingLine())}</div>
    <div class="succ-links">
      <a class="succ-link" href="autofilm-dashboard.html"><div class="succ-link-ico">📊</div><div><div class="succ-link-txt">Open Dashboard</div><div class="succ-link-sub">See team stats and manage your dealership</div></div></a>
      <a class="succ-link" href="autofilm-record.html"><div class="succ-link-ico">📹</div><div><div class="succ-link-txt">Record Your First Video</div><div class="succ-link-sub">Try the teleprompter with AI script assist</div></div></a>
      <a class="succ-link" href="autofilm-settings.html"><div class="succ-link-ico">💳</div><div><div class="succ-link-txt">Manage Billing</div><div class="succ-link-sub">Update card, change plan, view invoices</div></div></a>
    </div>
  </div>`;
}

function planLabel(plan) {
  return plan === 'bundle' ? 'Suite Bundle' : 'AutoFilm';
}

function fmtDate(iso) {
  try {
    return new Date(iso).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
  } catch { return iso; }
}

function trialCopy() {
  if (billing.status === 'trialing' && billing.trial_ends_at) {
    return `You're on the ${planLabel(billing.plan)} plan. No charge until ${fmtDate(billing.trial_ends_at)} — cancel anytime from Settings.`;
  }
  if (billing.status === 'active') {
    return `Your ${planLabel(billing.plan)} subscription is active.`;
  }
  return `Payment method saved. Your 14-day free trial is active — you won't be charged until it ends, and you can cancel anytime from Settings.`;
}

function billingLine() {
  if (billing.status === 'trialing' && billing.trial_ends_at) {
    return `Free trial active — ${planLabel(billing.plan)} plan, no charge until ${fmtDate(billing.trial_ends_at)}.`;
  }
  if (billing.status === 'trialing') return `Free trial active — ${planLabel(billing.plan)} plan.`;
  if (billing.status === 'active') return `Subscription active — ${planLabel(billing.plan)} plan.`;
  if (billingConfirmed) return 'Free trial starting — Stripe is confirming your subscription.';
  return 'No plan selected yet — pick one in Settings to start your free trial.';
}

async function refreshBillingStatus() {
  if (!AFSession.get()) return;
  try {
    const res = await AFSession.fetch(`${API}/api/billing/status`);
    if (!res.ok) return;
    billing = await res.json();
    if (['trialing', 'active'].includes(billing.status)) billingConfirmed = true;
    // Only re-render the billing-aware steps — never clobber form input elsewhere
    if (step === 4 || step === 6) render();
  } catch (e) { console.warn('[onboard] billing status failed:', e.message); }
}

async function startCheckout(plan, el) {
  if (checkoutBusy) return;
  checkoutBusy = true;
  if (el) el.classList.add('busy');
  try {
    saveState();
    const res = await AFSession.fetch(`${API}/api/billing/checkout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan, return_to: '/autofilm-onboard.html' }),
    });
    const data = await res.json();
    if (res.status === 409) {
      // Already trialing/active — nothing to buy, move along
      billingConfirmed = true;
      refreshBillingStatus();
      render();
      return;
    }
    if (!res.ok || !data.checkout_url) throw new Error(data.error || 'Could not start checkout');
    location.href = data.checkout_url;
  } catch (e) {
    alert('Error starting checkout: ' + e.message);
  } finally {
    checkoutBusy = false;
    if (el) el.classList.remove('busy');
  }
}

async function scanWebsite() {
  const url = document.getElementById('fUrl').value.trim();
  if (!url) { alert('Please enter your website URL'); return; }
  document.getElementById('btnScan').disabled = true;
  document.getElementById('scanning').classList.add('on');
  try {
    const res = await fetch(`${API}/api/onboard`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ website_url: url, admin_email: 'pending@autofilm.io', admin_name: 'Pending' }),
    });
    const data = await res.json();
    if (data.error && data.error !== 'Email already registered') throw new Error(data.error);
    rooftopId = data.rooftop_id;
    repId = data.rep_id;
    onboardToken = data.onboard_token || null;
    scraped = data.scraped || {};
    step = 2;
    render();
  } catch (e) {
    alert('Error scanning: ' + e.message);
    document.getElementById('btnScan').disabled = false;
    document.getElementById('scanning').classList.remove('on');
  }
}

async function confirmDetails() {
  try {
    await fetch(`${API}/api/onboard/${rooftopId}/confirm`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Onboard-Token': onboardToken },
      body: JSON.stringify({
        name: document.getElementById('fName').value.trim(),
        phone: document.getElementById('fPhone').value.trim(),
        brand_color: document.getElementById('fColor').value,
        address: document.getElementById('fAddr').value.trim(),
        city: document.getElementById('fCity').value.trim(),
        state: document.getElementById('fState').value.trim(),
      }),
    });
    scraped.name = document.getElementById('fName').value.trim();
    step = 3;
    render();
  } catch (e) { alert('Error: ' + e.message); }
}

async function createAccount() {
  const name = document.getElementById('fAdminName').value.trim();
  const email = document.getElementById('fAdminEmail').value.trim();
  const password = document.getElementById('fAdminPass').value;
  if (!name || !email) { alert('Please fill in your name and email'); return; }
  if (password.length < 8) { alert('Password must be at least 8 characters'); return; }
  try {
    // Real account: creates the Supabase Auth user and claims the
    // pending admin rep for this rooftop via the onboarding token.
    const res = await fetch(`${API}/api/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, rooftop_id: rooftopId, onboard_token: onboardToken }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Signup failed');

    AFSession.set(data.session, data.rep || { rooftop_id: rooftopId, role: 'admin', name, email });
    if (data.rep?.id) repId = data.rep.id;
    step = 4;
    render();
  } catch (e) { alert('Error: ' + e.message); }
}

async function addRep() {
  const name = document.getElementById('fRepName').value.trim();
  const email = document.getElementById('fRepEmail').value.trim();
  const dept = document.getElementById('fRepDept').value;
  if (!name || !email) { alert('Name and email required'); return; }
  try {
    const res = await AFSession.fetch(`${API}/api/auth/invite`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, department: dept }),
    });
    const out = await res.json();
    if (!res.ok) throw new Error(out.error || 'Invite failed');
    invitedReps.push({ name, email, department: dept });
    render();
  } catch (e) { alert('Error: ' + e.message); }
}

function finishInvites() {
  step = 6;
  render();
  refreshBillingStatus(); // fill in the trial end date on the done screen
}

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// Boot — detect a return from Stripe Checkout (?billing=success|canceled)
(function boot() {
  const billingReturn = new URLSearchParams(location.search).get('billing');
  if (billingReturn) {
    history.replaceState(null, '', location.pathname);
    const restored = restoreState();
    if (restored || AFSession.get()) {
      step = 4;
      if (billingReturn === 'success') {
        billingConfirmed = true;
        refreshBillingStatus(); // pull real trial end date once the webhook lands
      } else {
        billingNotice = 'Checkout was canceled — no charge was made. Pick a plan below to start your free trial.';
      }
    }
    // No saved state and no session: fall through to step 1 from scratch
  }
  render();
})();
</script>
