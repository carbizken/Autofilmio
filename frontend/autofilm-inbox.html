<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AutoFilm Inbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap">
<style>
:root{--bg:#0a0a0d;--bg1:#111116;--bg2:#18181e;--bg3:#202028;--b0:rgba(255,255,255,.05);--b1:rgba(255,255,255,.09);--b2:rgba(255,255,255,.16);--t1:rgba(255,255,255,.96);--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.40);--t4:rgba(255,255,255,.20);--fire:#D94F00;--fire2:#E85A0A;--firet:rgba(217,79,0,.10);--fireb:rgba(217,79,0,.22);--green:#22c55e;--amber:#f59e0b;--rose:#f43f5e;--sky:#38bdf8;--ff:'Geist',-apple-system,sans-serif;--fm:'Geist Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ff);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow:hidden}
nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b0);z-index:200;display:flex;align-items:center;padding:0 24px}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-mark{width:28px;height:28px;background:var(--fire);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(217,79,0,.35)}
.nav-word{font-size:16px;font-weight:900;letter-spacing:-.3px}
.nav-word em{color:var(--fire2);font-style:normal}
.nav-tabs{display:flex;gap:4px;margin-left:40px}
.nav-tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .14s;text-decoration:none}
.nav-tab:hover{color:var(--t1);background:rgba(255,255,255,.04)}
.nav-tab.on{color:var(--fire2);background:var(--firet)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* Shell */
.shell{position:fixed;top:56px;left:0;right:0;bottom:0;display:flex;justify-content:center;padding:20px 24px}
.inbox{width:100%;max-width:1280px;display:flex;background:var(--bg1);border:1px solid var(--b1);border-radius:14px;overflow:hidden}

/* Conversation list */
.convs{width:340px;flex-shrink:0;border-right:1px solid var(--b0);display:flex;flex-direction:column;min-height:0}
.convs-hdr{padding:16px 20px;border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.convs-title{font-size:15px;font-weight:800;letter-spacing:-.2px}
.convs-badge{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--firet);border:1px solid var(--fireb);color:var(--fire2)}
.convs-body{flex:1;overflow-y:auto;min-height:0}
.conv{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--b0);cursor:pointer;transition:background .14s;position:relative}
.conv:hover{background:rgba(255,255,255,.02)}
.conv.on{background:var(--firet)}
.conv.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--fire)}
.conv-av{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--t2);flex-shrink:0}
.conv.on .conv-av{background:var(--fire);border-color:transparent;color:#fff}
.conv-main{flex:1;min-width:0}
.conv-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.conv-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:10px;color:var(--t4);font-family:var(--fm);flex-shrink:0}
.conv-preview{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.conv-preview .you{color:var(--t4);font-weight:600}
.conv.unread .conv-name{color:var(--t1)}
.conv.unread .conv-preview{color:var(--t2);font-weight:600}
.conv-dot{width:8px;height:8px;border-radius:50%;background:var(--fire2);box-shadow:0 0 6px rgba(232,90,10,.6);flex-shrink:0;display:none}
.conv.unread .conv-dot{display:block}

/* Thread */
.thread{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.thread-hdr{padding:12px 20px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:61px}
.back-btn{display:none;background:var(--bg2);border:1px solid var(--b1);color:var(--t2);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;font-family:var(--ff);cursor:pointer}
.thread-who{min-width:0}
.thread-name{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread-phone{font-size:11px;color:var(--t3);font-family:var(--fm);margin-top:1px}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;min-height:0}
.msg{max-width:72%;display:flex;flex-direction:column}
.msg.in{align-self:flex-start;align-items:flex-start}
.msg.out{align-self:flex-end;align-items:flex-end}
.bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.45;word-break:break-word;white-space:pre-wrap}
.msg.in .bubble{background:var(--bg3);border:1px solid var(--b1);color:var(--t1);border-bottom-left-radius:4px}
.msg.out .bubble{background:var(--fire);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 10px rgba(217,79,0,.25)}
.msg.pending .bubble{opacity:.55}
.msg.failed .bubble{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.4);color:var(--t1);box-shadow:none}
.msg-meta{font-size:10px;color:var(--t4);font-family:var(--fm);margin-top:4px;padding:0 4px}
.msg-meta .err{color:var(--rose);font-family:var(--ff);font-weight:600}
.bubble a{color:inherit;text-decoration:underline}
.media-link{display:inline-block;margin-top:4px;font-size:12px}

/* Composer */
.composer{padding:14px 20px;border-top:1px solid var(--b0);flex-shrink:0}
.optout-notice{display:none;align-items:center;gap:8px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.3);color:var(--rose);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:10px}
.optout-notice.show{display:flex}
.composer-row{display:flex;gap:10px;align-items:flex-end}
.composer textarea{flex:1;background:var(--bg2);border:1px solid var(--b1);border-radius:12px;color:var(--t1);font-family:var(--ff);font-size:13px;line-height:1.45;padding:11px 14px;resize:none;max-height:120px;min-height:42px;outline:none;transition:border-color .14s}
.composer textarea:focus{border-color:var(--fire)}
.composer textarea::placeholder{color:var(--t4)}
.composer textarea:disabled{opacity:.5;cursor:not-allowed}
.send-btn{background:var(--fire);border:none;color:#fff;border-radius:12px;padding:0 20px;height:42px;font-size:13px;font-weight:800;font-family:var(--ff);cursor:pointer;transition:all .14s;box-shadow:0 2px 10px rgba(217,79,0,.3);flex-shrink:0}
.send-btn:hover:not(:disabled){background:var(--fire2)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}

/* Empty states */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
.empty-ico{font-size:32px;margin-bottom:12px;opacity:.4}
.empty-txt{font-size:13px;color:var(--t3);line-height:1.5}

@media(max-width:840px){
  .nav-tabs{display:none}
  .shell{padding:0}
  .inbox{border-radius:0;border:none}
  .convs{width:100%;border-right:none}
  .thread{display:none}
  .inbox.thread-open .convs{display:none}
  .inbox.thread-open .thread{display:flex}
  .back-btn{display:block}
  .msg{max-width:84%}
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-mark"><svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M1.5 10.5L7 2 12.5 10.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="nav-word">Auto<em>Film</em></div>
  </div>
  <div class="nav-tabs">
    <a class="nav-tab" href="autofilm-dashboard.html">Dashboard</a>
    <div class="nav-tab on">Inbox</div>
  </div>
  <div class="nav-right"></div>
</nav>

<div class="shell">
  <div class="inbox" id="inbox">

    <!-- Left: conversation list -->
    <div class="convs">
      <div class="convs-hdr">
        <div class="convs-title">Inbox</div>
        <div class="convs-badge">Live</div>
      </div>
      <div class="convs-body" id="convList">
        <div class="empty"><div class="empty-ico">💬</div><div class="empty-txt">Loading conversations…</div></div>
      </div>
    </div>

    <!-- Right: thread -->
    <div class="thread">
      <div class="thread-hdr" id="threadHdr" style="display:none">
        <button class="back-btn" id="backBtn" type="button">&larr; Back</button>
        <div class="thread-who">
          <div class="thread-name" id="threadName"></div>
          <div class="thread-phone" id="threadPhone"></div>
        </div>
      </div>
      <div class="msgs" id="msgs">
        <div class="empty" id="noThread">
          <div class="empty-ico">📨</div>
          <div class="empty-txt">Select a conversation to read and reply.</div>
        </div>
      </div>
      <div class="composer" id="composer" style="display:none">
        <div class="optout-notice" id="optoutNotice">⛔ <span id="optoutMsg">Customer has opted out of SMS. Message not sent.</span></div>
        <div class="composer-row">
          <textarea id="msgInput" rows="1" placeholder="Type a reply…"></textarea>
          <button class="send-btn" id="sendBtn" type="button">Send</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="assets/session.js"></script>
<script>
if (!AFSession.requireAuth()) throw new Error('redirecting');
const API = AFSession.API;

// ── State ──────────────────────────────────────────────────
let conversations = [];
let activePhone = null;
let activeName = null;
let activeVideoId = null;
let messages = [];            // server messages for the active thread
let pending = [];             // optimistic outbound messages not yet confirmed by server
let optedOut = false;
let sending = false;
let threadLoadSeq = 0;        // guards against stale thread responses after switching

const $ = (id) => document.getElementById(id);
const inboxEl = $('inbox');
const convList = $('convList');
const msgsEl = $('msgs');
const inputEl = $('msgInput');
const sendBtn = $('sendBtn');

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function timeAgo(d) {
  if (!d) return '';
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'now';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}

function msgTime(d) {
  if (!d) return '';
  const dt = new Date(d);
  const time = dt.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  const today = new Date();
  const sameDay = dt.toDateString() === today.toDateString();
  return sameDay ? time : dt.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + time;
}

// Read-state tracking (client-side; API has no read receipts)
const readKey = (phone) => 'af_inbox_read:' + phone;
function markRead(phone, at) {
  try { localStorage.setItem(readKey(phone), at || new Date().toISOString()); } catch {}
}
function isUnread(c) {
  if (c.last_direction !== 'inbound') return false;
  try {
    const seen = localStorage.getItem(readKey(c.customer_phone));
    return !seen || new Date(c.last_at) > new Date(seen);
  } catch { return true; }
}

// ── Conversations pane ─────────────────────────────────────
async function loadConversations() {
  try {
    const res = await AFSession.fetch(`${API}/api/messaging/conversations`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { conversations: list } = await res.json();
    conversations = (list || []).slice().sort((a, b) => new Date(b.last_at) - new Date(a.last_at));
    renderConversations();
  } catch (e) {
    console.error('[inbox] conversations error:', e);
    if (!conversations.length) {
      convList.innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Couldn’t load conversations. Retrying…</div></div>';
    }
  }
}

function renderConversations() {
  if (!conversations.length) {
    convList.innerHTML = '<div class="empty"><div class="empty-ico">💬</div><div class="empty-txt">No conversations yet.<br>Replies to your video texts land here.</div></div>';
    return;
  }
  convList.innerHTML = conversations.map(c => {
    const name = c.customer_name || c.customer_phone || 'Unknown';
    const initials = String(name).split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const cls = ['conv'];
    if (c.customer_phone === activePhone) cls.push('on');
    if (isUnread(c) && c.customer_phone !== activePhone) cls.push('unread');
    const preview = c.last_direction === 'outbound'
      ? '<span class="you">You:</span> ' + esc(c.last_message || '')
      : esc(c.last_message || '');
    return `<div class="${cls.join(' ')}" data-phone="${esc(c.customer_phone)}">
      <div class="conv-av">${esc(initials)}</div>
      <div class="conv-main">
        <div class="conv-top"><div class="conv-name">${esc(name)}</div><div class="conv-time">${timeAgo(c.last_at)}</div></div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-dot"></div>
    </div>`;
  }).join('');
}

convList.addEventListener('click', (e) => {
  const row = e.target.closest('.conv');
  if (!row) return;
  const phone = row.dataset.phone;
  const c = conversations.find(x => x.customer_phone === phone);
  if (c) openThread(c);
});

// ── Thread pane ────────────────────────────────────────────
function openThread(c) {
  activePhone = c.customer_phone;
  activeName = c.customer_name || c.customer_phone;
  activeVideoId = c.video_id || null;
  messages = [];
  pending = [];
  optedOut = false;
  $('optoutNotice').classList.remove('show');
  $('threadHdr').style.display = 'flex';
  $('composer').style.display = 'block';
  $('threadName').textContent = activeName;
  $('threadPhone').textContent = c.customer_phone;
  msgsEl.innerHTML = '<div class="empty"><div class="empty-ico">💬</div><div class="empty-txt">Loading messages…</div></div>';
  inboxEl.classList.add('thread-open');
  setComposerEnabled(true);
  markRead(activePhone, c.last_at);
  renderConversations();
  loadThread(true);
  inputEl.focus();
}

function closeThread() {
  activePhone = null;
  inboxEl.classList.remove('thread-open');
  renderConversations();
}
$('backBtn').addEventListener('click', closeThread);

async function loadThread(initial = false) {
  if (!activePhone) return;
  const seq = ++threadLoadSeq;
  const phone = activePhone;
  try {
    const res = await AFSession.fetch(`${API}/api/messaging/thread?customer_phone=${encodeURIComponent(phone)}&limit=200`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { messages: list } = await res.json();
    if (seq !== threadLoadSeq || phone !== activePhone) return; // switched threads mid-flight
    messages = list || [];
    // Drop optimistic messages the server now knows about
    const sids = new Set(messages.map(m => m.provider_sid).filter(Boolean));
    pending = pending.filter(p => !(p.sid && sids.has(p.sid)));
    renderThread(initial);
    const newest = messages[messages.length - 1];
    if (newest) markRead(phone, newest.created_at);
  } catch (e) {
    console.error('[inbox] thread error:', e);
    if (initial && phone === activePhone) {
      msgsEl.innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Couldn’t load this thread. Retrying…</div></div>';
    }
  }
}

function renderMsg(m) {
  const dir = m.direction === 'inbound' ? 'in' : 'out';
  const cls = ['msg', dir];
  if (m._pending) cls.push('pending');
  if (m._failed) cls.push('failed');
  let media = '';
  if (Array.isArray(m.media_urls) && m.media_urls.length) {
    media = m.media_urls.map((u, i) =>
      `<a class="media-link" href="${esc(u)}" target="_blank" rel="noopener">📎 Attachment ${m.media_urls.length > 1 ? i + 1 : ''}</a>`
    ).join('');
  }
  let meta;
  if (m._failed) meta = `<span class="err">Not sent — ${esc(m._error || 'failed')}</span>`;
  else if (m._pending) meta = 'Sending…';
  else meta = msgTime(m.created_at);
  return `<div class="${cls.join(' ')}">
    <div class="bubble">${esc(m.body)}${media}</div>
    <div class="msg-meta">${meta}</div>
  </div>`;
}

function renderThread(forceScroll = false) {
  const all = messages.concat(pending);
  if (!all.length) {
    msgsEl.innerHTML = '<div class="empty"><div class="empty-ico">💬</div><div class="empty-txt">No messages in this thread yet.<br>Say hello below.</div></div>';
    return;
  }
  const nearBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 80;
  msgsEl.innerHTML = all.map(renderMsg).join('');
  if (forceScroll || nearBottom) msgsEl.scrollTop = msgsEl.scrollHeight;
}

// ── Composer / send ────────────────────────────────────────
function setComposerEnabled(on) {
  inputEl.disabled = !on;
  sendBtn.disabled = !on;
  inputEl.placeholder = on ? 'Type a reply…' : 'Texting this customer is disabled';
}

function autoGrow() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoGrow);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const body = inputEl.value.trim();
  if (!body || !activePhone || optedOut || sending) return;
  sending = true;
  sendBtn.disabled = true;

  const optimistic = { direction: 'outbound', body, created_at: new Date().toISOString(), _pending: true, sid: null };
  pending.push(optimistic);
  inputEl.value = '';
  autoGrow();
  renderThread(true);

  try {
    const res = await AFSession.fetch(`${API}/api/messaging/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customer_phone: activePhone, body, video_id: activeVideoId || undefined }),
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok && data.success) {
      optimistic._pending = false;
      optimistic.sid = data.sid || null;
      renderThread(true);
      loadThread();           // pull the confirmed row (dedupes by sid)
      loadConversations();    // refresh previews
    } else {
      optimistic._pending = false;
      optimistic._failed = true;
      optimistic._error = data.error || `HTTP ${res.status}`;
      if (res.status === 403) {
        // TCPA guard: customer has opted out — surface the API's message and lock the composer
        optedOut = true;
        $('optoutMsg').textContent = data.error || 'Customer has opted out of SMS. Message not sent.';
        $('optoutNotice').classList.add('show');
        setComposerEnabled(false);
      }
      renderThread(true);
    }
  } catch (e) {
    console.error('[inbox] send error:', e);
    optimistic._pending = false;
    optimistic._failed = true;
    optimistic._error = 'network error';
    renderThread(true);
  } finally {
    sending = false;
    if (!optedOut) sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── Polling (paused while tab is hidden) ───────────────────
function visible() { return document.visibilityState === 'visible'; }

const convPollTimer = setInterval(() => { if (visible()) loadConversations(); }, 15000);
const threadPollTimer = setInterval(() => { if (visible() && activePhone) loadThread(); }, 5000);

document.addEventListener('visibilitychange', () => {
  if (visible()) {
    loadConversations();
    if (activePhone) loadThread();
  }
});

// Stop polling when the page is unloaded/backgrounded via bfcache.
window.addEventListener('pagehide', () => {
  clearInterval(convPollTimer);
  clearInterval(threadPollTimer);
});

loadConversations();
</script>
</body>
</html>
