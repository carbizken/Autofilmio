# Render deploy configuration — infrastructure as code.
#
# IMPORTANT: numInstances is pinned to 1. Live-call signaling, the
# in-memory rate limiter, and the BDC dedup set are per-instance state.
# Do not scale horizontally until those move to Redis (see backlog).
services:
  - type: web
    name: autofilm-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    numInstances: 1
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      # Secrets are managed in the Render dashboard — never in this file:
      # MUX_TOKEN_ID / MUX_TOKEN_SECRET / MUX_WEBHOOK_SECRET
      # TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN / TWILIO_PHONE_NUMBER
      # SUPABASE_URL / SUPABASE_SERVICE_KEY
      # ANTHROPIC_API_KEY / SENDGRID_API_KEY
      # STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET
      # 3-tier price ids (from `node scripts/stripe-setup-prices.mjs`):
      #   STRIPE_PRICE_SALES_MONTHLY / STRIPE_PRICE_SALES_ANNUAL
      #   STRIPE_PRICE_SERVICE_MONTHLY / STRIPE_PRICE_SERVICE_ANNUAL
      #   STRIPE_PRICE_COMPLETE_MONTHLY / STRIPE_PRICE_COMPLETE_ANNUAL
      #   STRIPE_PRICE_BUNDLE  (+ STRIPE_PRICE_BUNDLE_ANNUAL, STRIPE_PRICE_STANDARD legacy)
      # VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY / VAPID_EMAIL
      # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID / CLOUDFLARE_KV_NAMESPACE_ID / CF_WORKER_URL
      # APP_URL / AUTOCURB_JWT_SECRET / SENTRY_DSN
      # PASSPORT_URL_BASE — passport page the p_<code> short links resolve
      #   to (default https://autofilm.io/mpi.html?view=passport; the code
      #   is appended as ?code=/&code= depending on the base's query)
      # PLATFORM_ADMIN_EMAILS — comma-separated vendor-operator allowlist;
      #   empty/unset = all /api/platform routes 403 (fail closed)
      # Vehicle stock imagery (MPI header / Passport card):
      #   MARKETCHECK_API_KEY — marketcheck.com listings API
      #   VEHICLE_IMAGE_PROVIDER — marketcheck (default) | evox | none
      #   EVOX_API_KEY — only when VEHICLE_IMAGE_PROVIDER=evox
      # Feature flags (default OFF — set in the dashboard to enable):
      #   REMINDERS_ENABLED=true — start the vehicle_reminders SMS delivery
      #     worker (requires migration 015; REMINDER_WORKER_INTERVAL_MS
      #     optionally overrides the hourly tick). Handles both date-due
      #     (due_at) and mileage-due (due_miles vs latest odometer_readings)
      #   RETENTION_SWEEP_ENABLED=true — start the daily vehicle_media
      #     retention sweep: rows past retention_expires_at are marked
      #     storage_state='purged' + purged_at. LOG-ONLY first pass — the
      #     mux_asset_id deletion worklist is logged, no Mux delete call
      #     is made yet (RETENTION_SWEEP_INTERVAL_MS optionally overrides
      #     the daily tick)
      #   LIFETIME_OFFERS_ENABLED=true — allow rooftops to save AND render
      #     lifetime pricing configs (tier_plus_lifetime / lifetime_enabled);
      #     off pending legal review — while off, saved lifetime configs
      #     render as three_tier with lifetime stripped
