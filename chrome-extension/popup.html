<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:340px;font-family:'Segoe UI',-apple-system,sans-serif;background:#0a0a0d;color:rgba(255,255,255,.96)}

.header{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.09)}
.mark{width:28px;height:28px;background:#D94F00;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mark svg{stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}
.wordmark{font-size:15px;font-weight:900;letter-spacing:-.3px}
.wordmark em{color:#E85A0A;font-style:normal}
.status{margin-left:auto;font-size:9px;font-weight:700;padding:3px 8px;border-radius:12px}
.status.on{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#22c55e}
.status.off{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);color:#f43f5e}

.body{padding:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:5px}
.field input{width:100%;padding:9px 11px;background:#18181e;border:1px solid rgba(255,255,255,.09);border-radius:8px;color:rgba(255,255,255,.96);font-size:12px;outline:none;font-family:inherit}
.field input:focus{border-color:#D94F00}
.field input::placeholder{color:rgba(255,255,255,.2)}

.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .14s}
.btn-rec{background:#D94F00;color:#fff;box-shadow:0 3px 14px rgba(217,79,0,.3);margin-bottom:8px}
.btn-rec:hover{background:#E85A0A}
.btn-script{background:rgba(217,79,0,.1);border:1px solid rgba(217,79,0,.22);color:#E85A0A;margin-bottom:8px}
.btn-insert{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);color:#38bdf8}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.stat{background:#111116;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:900;font-family:'Segoe UI',monospace;letter-spacing:-1px}
.stat-l{font-size:9px;color:rgba(255,255,255,.4);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

.footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.05);text-align:center;font-size:10px;color:rgba(255,255,255,.2)}
.footer a{color:#E85A0A;text-decoration:none}

.recording-indicator{display:none;align-items:center;gap:8px;padding:12px 16px;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);border-radius:10px;margin-bottom:12px}
.recording-indicator.on{display:flex}
.rec-pulse{width:10px;height:10px;border-radius:50%;background:#dc2626;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rec-time{font-family:monospace;font-weight:700;font-size:13px;flex:1}
.rec-stop{padding:4px 10px;border-radius:6px;background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.3);color:#dc2626;font-size:10px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="mark"><svg width="11" height="11" viewBox="0 0 14 14"><path d="M1.5 10.5L7 2 12.5 10.5"/></svg></div>
  <div class="wordmark">Auto<em>Film</em></div>
  <div class="status" id="status">--</div>
</div>

<div class="body">
  <div class="recording-indicator" id="recIndicator">
    <div class="rec-pulse"></div>
    <div class="rec-time" id="recTime">00:00</div>
    <div class="rec-stop" onclick="stopRecording()">Stop</div>
  </div>

  <div class="field">
    <label>Customer Name</label>
    <input id="fCustomer" placeholder="John Smith">
  </div>
  <div class="field">
    <label>Vehicle (optional)</label>
    <input id="fVehicle" placeholder="2025 Honda Accord">
  </div>

  <button class="btn btn-rec" id="btnRec" onclick="startRecording()">
    Record Video
  </button>
  <button class="btn btn-script" onclick="generateScript()">
    Generate AI Script
  </button>
  <button class="btn btn-insert" onclick="insertVideoLink()">
    Insert Video Link
  </button>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sVideos">--</div><div class="stat-l">Videos Today</div></div>
    <div class="stat"><div class="stat-n" id="sWatch">--</div><div class="stat-l">Avg Watch %</div></div>
  </div>
</div>

<div class="footer">
  <a href="https://autofilm.io/autofilm-dashboard.html" target="_blank">Open Dashboard</a> &middot; v1.0.0
</div>

<script>
const API = 'https://api.autofilm.io';

// Load saved settings
chrome.storage.local.get(['af_rep_id', 'af_rooftop_id'], (data) => {
  if (data.af_rep_id) {
    document.getElementById('status').textContent = 'Connected';
    document.getElementById('status').className = 'status on';
  } else {
    document.getElementById('status').textContent = 'Not Set Up';
    document.getElementById('status').className = 'status off';
  }
});

function startRecording() {
  const customer = document.getElementById('fCustomer').value.trim();
  const vehicle = document.getElementById('fVehicle').value.trim();
  chrome.storage.local.get(['af_rep_id', 'af_rooftop_id'], (data) => {
    const url = `https://autofilm.io/autofilm-record.html?rep_id=${data.af_rep_id || ''}&rooftop_id=${data.af_rooftop_id || ''}&customer_name=${encodeURIComponent(customer)}&vehicle=${encodeURIComponent(vehicle)}`;
    chrome.tabs.create({ url });
  });
}

async function generateScript() {
  const customer = document.getElementById('fCustomer').value.trim() || 'the customer';
  const vehicle = document.getElementById('fVehicle').value.trim();
  try {
    const res = await fetch(`${API}/api/ai-script`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customer_name: customer, vehicle }),
    });
    const data = await res.json();
    if (data.script) {
      await navigator.clipboard.writeText(data.script);
      alert('Script copied to clipboard!');
    }
  } catch (e) {
    console.error('Script error:', e);
  }
}

function insertVideoLink() {
  chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
    chrome.tabs.sendMessage(tabs[0].id, { action: 'insertVideoLink' });
  });
}
</script>
</body>
</html>
